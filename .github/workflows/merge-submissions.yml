name: Merge community submissions

# Whenever the prompt-library branch advances, consolidate anything under submissions/ into
# library.json and stamp each prompt with its contributor's GitHub handle (issue #105).
#
# Triggering on `push` (not just PR-merge) means this works for BOTH ways a submission can land:
#   * an external contributor's pull request being merged (the merge is a push to this branch), and
#   * a direct commit by someone with write access (e.g. the maintainer adding one from the app).
# Attribution is resolved per file from the commit that ADDED it, so it is correct in either case.
#
# Security: the workflow file always comes from this trusted branch, never from a fork. It runs no
# code from a PR — it only reads the JSON data already merged onto the branch and validates it
# against schema.json. The maintainer's review/merge stays the gate.
#
# No infinite loop: pushes made with the default GITHUB_TOKEN do not trigger further workflow runs,
# and the actor guard + "nothing to commit" check are belt-and-suspenders on top of that.
on:
  push:
    branches: [prompt-library]

permissions:
  contents: write

jobs:
  consolidate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: prompt-library
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install jsonschema

      - name: Fold any submissions into library.json
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 merge_submissions.py "${{ github.repository }}"

      - name: Commit and push
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add library.json
            git add -u submissions/
            git commit -m "Consolidate prompt submissions into library.json"
            git push origin prompt-library
          else
            echo "No submissions to consolidate."
          fi
