name: Validate prompt library

# Runs on every push/PR to the prompt-library branch so community submissions are checked
# automatically before they are merged.
on:
  push:
    branches: [prompt-library]
  pull_request:
    branches: [prompt-library]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install jsonschema
      - run: python3 validate.py
